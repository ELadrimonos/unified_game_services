name: unified_game_services_epic
resolution: workspace
description: Epic Online Services (EOS) provider for unified_game_services, backed by the EOS C SDK via pure-Dart dart:ffi. Desktop only.
version: 0.0.1
repository: https://github.com/ELadrimonos/unified_game_services

topics:
  - game-services
  - achievements
  - leaderboards
  - epic-games
  - gamedev

# EOS C SDK ships shared libs for desktop; the host supplies the runtime lib.
platforms:
  linux:
  macos:
  windows:

environment:
  sdk: ^3.12.0

dependencies:
  ffi: ^2.1.4
  unified_game_services_platform_interface: ^0.0.1

dev_dependencies:
  ffigen: ^21.0.0-dev.0
  lints: ^6.0.0
  test: ^1.25.6
