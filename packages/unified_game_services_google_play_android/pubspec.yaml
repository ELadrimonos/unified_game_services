name: unified_game_services_google_play_android
# JNI bindings in lib/src/playgames_bindings.dart are generated and committed
# (regenerate with tool/regenerate_bindings.sh on a machine with the Android
# SDK + a JDK ≤21 + network to Google's Maven). The package analyzes on any
# platform but only RUNS on Android (the Play Games SDK loads only there).
resolution: workspace
description: Native Google Play Games provider for unified_game_services via the Play Games v2 Java SDK over package:jni (pure Dart, no Flutter). Android only; fires native achievement/leaderboard UI.
version: 0.0.1
publish_to: none
repository: https://github.com/ELadrimonos/unified_game_services

topics:
  - game-services
  - achievements
  - leaderboards
  - google-play-games
  - android

# Android only — the Play Games v2 Java SDK loads only there.
platforms:
  android:

environment:
  sdk: ^3.12.0

dependencies:
  # jnigen 0.16.0 generates against the jni 1.0.0 API (`.object<T>()`).
  jni: ^1.0.0
  unified_game_services_platform_interface: ^0.0.1

screenshots:
  - path: screenshot.png
    description: Code example showcasing on-device capabilities

dev_dependencies:
  jnigen: ^0.16.0
  lints: ^6.0.0
  test: ^1.25.6
