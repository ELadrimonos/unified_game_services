name: unified_game_services_gamejolt
resolution: workspace
description: GameJolt provider for unified_game_services, using the GameJolt Game API v1.2 (pure Dart, REST).
version: 0.0.1
repository: https://github.com/ELadrimonos/unified_game_services

topics:
  - game-services
  - achievements
  - leaderboards
  - gamejolt
  - gamedev

# Pure-Dart REST (package:http, no dart:io) — runs everywhere.
platforms:
  android:
  ios:
  linux:
  macos:
  web:
  windows:

environment:
  sdk: ^3.12.0

# Add regular dependencies here.
dependencies:
  crypto: ^3.0.6
  http: ^1.2.0
  unified_game_services_platform_interface: ^0.0.1

dev_dependencies:
  args: ^2.6.0
  lints: ^6.0.0
  test: ^1.25.6
