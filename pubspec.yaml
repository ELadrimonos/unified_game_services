name: unified_game_services_monorepo

repository: https://github.com/ELadrimonos/unified_game_services

environment:
  sdk: ^3.12.0

workspace:
  - packages/unified_game_services
  - packages/unified_game_services_platform_interface
  - packages/unified_game_services_android_rest
  - packages/unified_game_services_game_center
  - packages/unified_game_services_steam
  - packages/unified_game_services_epic
  - packages/unified_game_services_gamejolt
  - packages/unified_game_services_xbox_pc
  - packages/unified_game_services_playfab

dev_dependencies:
  melos: ^7.5.1

melos:
  name: unified_game_services

  command:
    bootstrap:
      runPubGetInParallel: true
    version:
      # Per-package CHANGELOG.md (default on) + aggregated workspace changelog.
      workspaceChangelog: true
      # Restrict automatic versioning to the main branch.
      branch: main
      # Link changelog entries to their commits.
      linkToCommits: true
      # Print a prefilled GitHub "new release" URL per bumped package.
      releaseUrl: true
      # Per-package git tags (`<package-name>-v<version>`) are created by
      # default (--git-tag-version). No extra key needed.

  scripts:
    version:sync:
      description: >
        Sync the master version (root VERSION file) into every package's
        pubspec, including internal cross-package dependency constraints.
        Pass `-- --check` to fail (CI) instead of writing.
      run: dart run tool/sync_version.dart

    analyze:
      description: Run dart analyze in all packages.
      run: dart analyze --fatal-infos

    format:
      description: Format all packages.
      run: dart format .

    format-check:
      description: Check formatting in all packages.
      run: dart format --set-exit-if-changed .

    test:
      description: Run tests in packages that have them.
      run: dart test
      packageFilters:
        dirExists: test

    steam:gen:
      description: >
        Generate Steamworks bindings for the Steam provider. Pass SDK location
        via --sdk/--zip/--url or STEAMWORKS_SDK[_ZIP|_URL]. Forward args after
        `--`, e.g. `melos run steam:gen -- --sdk /path/to/sdk -t linux`.
      run: dart run tool/generate_steamworks.dart
      packageFilters:
        scope: unified_game_services_steam

    gamejolt:smoke:
      description: >
        Live smoke test against the real GameJolt API. Needs GAMEJOLT_GAME_ID,
        GAMEJOLT_PRIVATE_KEY, GAMEJOLT_USERNAME, GAMEJOLT_USER_TOKEN. Forward
        args after `--`, e.g. `melos run gamejolt:smoke -- --cloud --session`.
      run: dart run tool/smoke_test.dart
      packageFilters:
        scope: unified_game_services_gamejolt
